<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Working On</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    font-family: "Segoe UI", Arial, sans-serif;
    color: #b8860b;
  }

  .card {
    text-align: center;
    padding: 50px 70px;
    background: #ffffff;
    border: 2px solid #f1e0a6;
    border-radius: 18px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.08);
  }

  .title {
    font-size: 2.2rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: #b8860b;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 1rem;
    color: #c9a227;
    opacity: 0.9;
    margin-bottom: 25px;
  }

  .loader {
    width: 55px;
    height: 55px;
    border: 5px solid #f3e7c3;
    border-top: 5px solid #d4af37;
    border-radius: 50%;
    margin: 0 auto;
    animation: spin 1s linear infinite;
  }

  .dot {
    display: inline-block;
    animation: blink 1.5s infinite;
    color: #d4af37;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  .hourglass {
    display: inline-block;
    animation: swing 2s ease-in-out infinite;
    margin-left: 8px;
  }

  @keyframes swing {
    0% { transform: rotate(0deg) translateY(0px); }
    25% { transform: rotate(10deg) translateY(-2px); }
    50% { transform: rotate(0deg) translateY(0px); }
    75% { transform: rotate(-10deg) translateY(-2px); }
    100% { transform: rotate(0deg) translateY(0px); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="title">Working on <span class="hourglass">⏳</span></div>
  
  <div class="loader"></div>
</div>

</body>
</html>
